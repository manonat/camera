<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>People Counter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);

    min-height:100vh;
    padding:20px;
}


.title{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.video-wrapper{
    position:relative;
    width:100%;
    max-width:700px;
    margin:0 auto 20px auto;
    border-radius:16px;
    overflow:hidden;
    background:#000;
    box-shadow:         0 4px 15px rgba(0,0,0,.15);
}

#video{
    display:block;
    width:100%;
    height:320px;
    object-fit:cover;
}

#canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.stats{
    display:grid;
    grid-template-columns:
        repeat(3,1fr);
    gap:15px;
    margin-top:20px;
}

.stat{
    background:#fff;
    border-radius:16px;
    padding:15px;
    text-align:center;
    box-shadow:         0 2px 10px rgba(0,0,0,.08);
}


button{
    flex:1;
    border:none;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.start-btn{
    background:#10b981;
    color:white;
}

.stop-btn{
    background:#ef4444;
    color:white;
}

.status{
    margin-top:15px;
    background:#f3f4f6;
    padding:12px;
    border-radius:12px;
}




.stat h3{
    font-size:14px;
    color:#666;
    margin-bottom:10px;
}

.stat span{
    font-size:42px;
    font-weight:bold;
}

.in{
    color:#10b981;
}

.out{
    color:#ef4444;
}

.net{
    color:#f59e0b;
}

@media(max-width:768px){

    .stats{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="container">

<h1 class="title">
    📹 People Counter System
</h1>

<div class="card">

    <div class="video-wrapper">
        <video
            id="video"
            autoplay
            playsinline
            muted>
        </video>

        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">

        <button
            class="start-btn"
            onclick="startCam()">
            เปิดกล้อง
        </button>
<button onclick="switchCamera()">
📷 สลับกล้อง
</button>
        <button
            class="stop-btn"
            onclick="stopCam()">
            ปิดกล้อง
        </button>

    </div>

    <div class="status">
        สถานะ :
        <span id="cameraStatus">
            ยังไม่เชื่อมต่อกล้อง
        </span>
    </div>

</div>

<div class="stats">

    <div class="stat">
        <h3>People IN</h3>
        <span
            id="inCount"
            class="in">
            0
        </span>
    </div>

    <div class="stat">
        <h3>People OUT</h3>
        <span
            id="outCount"
            class="out">
            0
        </span>
    </div>

    <div class="stat">
        <h3>Net Count</h3>
        <span
            id="netCount"
            class="net">
            0
        </span>
    </div>

</div>

</div>

    <script>

let currentStream = null;
let currentFacing = "environment";
let motionRunning = false;
let prevFrame = null;
let inCounter = 0;
let outCounter = 0;
let lastCenterX = null;
let lastTriggerTime = 0;

// 🔧 ตั้งค่า ANTI-JITTER
const MOTION_THRESHOLD = 1000;      // ⬆️ เพิ่มเป็น 1500 (เดิม 35 ต่ำเกินไป!)
const MIN_PIXELS = 500;             // เพิ่มจาก 300 เป็น 500 (ต้องเคลื่อนไหวพื้นที่ใหญ่)
const COOLDOWN = 500;

// 🆕 DEBOUNCING & SMOOTHING
const DEBOUNCE_FRAMES = 3;          // ต้องเห็น motion ต่อเนื่อง 6 เฟรมก่อนนับ
const SMOOTHING_WINDOW = 3;         // Average motion ของ 3 เฟรม
const ROI_PERCENT = 18;             // เส้นตรวจจับกว้าง 18% ของหน้าจอ

let motionHistory = [];             // buffer สำหรับ debouncing
let motionValues = [];              // buffer สำหรับ smoothing
let frameCount = 0;

// ปุ่มสลับหน้าหลัง
async function switchCamera(){
    currentFacing = currentFacing === "environment" ? "user" : "environment";
    stopCam();
    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:{ ideal: currentFacing }
        },
        audio:false
    });
    currentStream = stream;
    document.getElementById("video").srcObject = stream;
    startCounter();
}

async function startCam(){
    try{
        document.getElementById("cameraStatus").textContent = "กำลังขอสิทธิ์กล้อง...";
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:{ ideal:"environment" } },
            audio:false
        });
        currentStream = stream;
        document.getElementById("video").srcObject = stream;
        document.getElementById("cameraStatus").textContent = "✅ กล้องพร้อมใช้งาน";
        startCounter();
    }
    catch(e){
        document.getElementById("cameraStatus").textContent = "❌ " + e.message;
        alert(e.name + "\n" + e.message);
    }
}

function stopCam(){
    if(currentStream){
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
    }
    document.getElementById("video").srcObject = null;
    document.getElementById("cameraStatus").textContent = "⏹️ ปิดกล้องแล้ว";
    motionRunning = false;
    prevFrame = null;
    lastCenterX = null;
    motionHistory = [];
    motionValues = [];
}

function startCounter(){
    if(motionRunning) return;
    motionRunning = true;
    frameCount = 0;
    motionHistory = [];
    motionValues = [];

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    function loop(){
        if(!motionRunning) return;

        if(video.readyState >= 2){
            canvas.width = 800;
            canvas.height = 450;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

            const lineX = canvas.width / 2;
            const CROSS_ZONE = 30;
            const leftZone = lineX - CROSS_ZONE;
            const rightZone = lineX + CROSS_ZONE;

            // 🎯 ROI: คำนวณบริเวณตรวจจับเฉพาะเส้นกลาง
            const roiWidth = Math.floor((ROI_PERCENT / 100) * canvas.width);
            const roiStartX = Math.floor((canvas.width - roiWidth) / 2);
            const roiEndX = roiStartX + roiWidth;

            // เส้นโซนซ้าย
            ctx.beginPath();
            ctx.strokeStyle = "orange";
            ctx.lineWidth = 2;
            ctx.moveTo(leftZone, 0);
            ctx.lineTo(leftZone, canvas.height);
            ctx.stroke();

            // เส้นกลาง
            ctx.beginPath();
            ctx.strokeStyle = "red";
            ctx.lineWidth = 4;
            ctx.moveTo(lineX, 0);
            ctx.lineTo(lineX, canvas.height);
            ctx.stroke();

            // เส้นโซนขวา
            ctx.beginPath();
            ctx.strokeStyle = "orange";
            ctx.lineWidth = 2;
            ctx.moveTo(rightZone, 0);
            ctx.lineTo(rightZone, canvas.height);
            ctx.stroke();

            // 🆕 แสดง ROI (บริเวณตรวจจับ)
            ctx.strokeStyle = "rgba(0, 255, 255, 0.3)";
            ctx.lineWidth = 1;
            ctx.strokeRect(roiStartX, 0, roiWidth, canvas.height);

            if(prevFrame){
                const data = frame.data;
                const oldData = prevFrame.data;

                let minX = canvas.width;
                let maxX = 0;
                let minY = canvas.height;
                let maxY = 0;
                let changed = 0;

                // 🎯 คำนวณ motion เฉพาะใน ROI
                for(let i=0; i<data.length; i+=16){
                    const p = i/4;
                    const x = p % canvas.width;
                    const y = Math.floor(p / canvas.width);

                    // ข้ามถ้านอก ROI
                    if(x < roiStartX || x > roiEndX) continue;

                    const diff = 
                        Math.abs(data[i]-oldData[i]) +
                        Math.abs(data[i+1]-oldData[i+1]) +
                        Math.abs(data[i+2]-oldData[i+2]);

                    if(diff > MOTION_THRESHOLD){
                        changed++;
                        if(x<minX) minX=x;
                        if(x>maxX) maxX=x;
                        if(y<minY) minY=y;
                        if(y>maxY) maxY=y;
                    }
                }

                // 📊 Smoothing: เก็บ motion value ของหลายเฟรม
                motionValues.push(changed);
                if(motionValues.length > SMOOTHING_WINDOW){
                    motionValues.shift();
                }
                const smoothedMotion = motionValues.reduce((a,b) => a+b, 0) / motionValues.length;

                // ⏱️ Debouncing: ต้องเห็น motion ต่อเนื่องกี่เฟรม
                if(smoothedMotion > MIN_PIXELS){
                    motionHistory.push({
                        changed: Math.floor(smoothedMotion),
                        centerX: (minX + maxX) / 2
                    });
                } else {
                    motionHistory = [];
                }

                // 🎬 ถ้า debounce trigger → นับ
                if(motionHistory.length >= DEBOUNCE_FRAMES){
                    // หา centerX ที่ใช้งานได้
                    const validMotions = motionHistory.filter(m => !isNaN(m.centerX) && m.centerX > 0);
                    
                    if(validMotions.length > 0){
                        const centerX = validMotions[validMotions.length - 1].centerX;
                        const centerY = (minY + maxY) / 2;

                        ctx.strokeStyle = "lime";
                        ctx.lineWidth = 3;
                        ctx.strokeRect(minX, minY, maxX-minX, maxY-minY);

                        ctx.beginPath();
                        ctx.fillStyle = "yellow";
                        ctx.arc(centerX, centerY, 10, 0, Math.PI*2);
                        ctx.fill();

                        const now = Date.now();

                        if(lastCenterX !== null && now - lastTriggerTime > COOLDOWN){
                            // ซ้าย -> ขวา = IN
                            if(lastCenterX <= lineX && centerX >= lineX){
                                inCounter++;
                                document.getElementById("inCount").textContent = inCounter;
                                document.getElementById("netCount").textContent = (inCounter - outCounter);
                                lastTriggerTime = now;
                                console.log("IN (debounced)");
                                
                                // 🆕 ส่งไป Google Sheets
                                saveEvent('IN');
                            }

                            // ขวา -> ซ้าย = OUT
                            if(lastCenterX >= lineX && centerX <= lineX){
                                outCounter++;
                                document.getElementById("outCount").textContent = outCounter;
                                document.getElementById("netCount").textContent = (inCounter - outCounter);
                                lastTriggerTime = now;
                                console.log("OUT (debounced)");
                                
                                // 🆕 ส่งไป Google Sheets
                                saveEvent('OUT');
                            }
                        }

                        lastCenterX = centerX;
                    }

                    // รีเซ็ต debounce
                    motionHistory = [];
                }
            }

            prevFrame = frame;
            frameCount++;
        }

        requestAnimationFrame(loop);
    }

    loop();
}

</script>

</body>
</html>
