<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>People Counter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.title{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.video-wrapper{
    position:relative;
    overflow:hidden;
    border-radius:15px;
    background:#000;
}

#video{
    width:100%;
    display:block;
}

#canvas{
    display:none;
}

.controls{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    border:none;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.start-btn{
    background:#10b981;
    color:white;
}

.stop-btn{
    background:#ef4444;
    color:white;
}

.status{
    margin-top:15px;
    background:#f3f4f6;
    padding:12px;
    border-radius:12px;
}

.stats{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.stat{
    background:white;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.stat h3{
    font-size:14px;
    color:#666;
    margin-bottom:10px;
}

.stat span{
    font-size:42px;
    font-weight:bold;
}

.in{
    color:#10b981;
}

.out{
    color:#ef4444;
}

.net{
    color:#f59e0b;
}

@media(max-width:768px){

    .stats{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="container">

```
<h1 class="title">
    📹 People Counter System
</h1>

<div class="card">

    <div class="video-wrapper">
        <video
            id="video"
            autoplay
            playsinline
            muted>
        </video>

        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">

        <button
            class="start-btn"
            onclick="startCam()">
            เปิดกล้อง
        </button>

        <button
            class="stop-btn"
            onclick="stopCam()">
            ปิดกล้อง
        </button>

    </div>

    <div class="status">
        สถานะ :
        <span id="cameraStatus">
            ยังไม่เชื่อมต่อกล้อง
        </span>
    </div>

</div>

<div class="stats">

    <div class="stat">
        <h3>People IN</h3>
        <span
            id="inCount"
            class="in">
            0
        </span>
    </div>

    <div class="stat">
        <h3>People OUT</h3>
        <span
            id="outCount"
            class="out">
            0
        </span>
    </div>

    <div class="stat">
        <h3>Net Count</h3>
        <span
            id="netCount"
            class="net">
            0
        </span>
    </div>

</div>
```

</div>

<script>

let currentStream = null;

async function startCam(){

    try{

        document
        .getElementById("cameraStatus")
        .textContent =
        "กำลังขอสิทธิ์กล้อง...";

        const stream =
        await navigator.mediaDevices
        .getUserMedia({
            video:true,
            audio:false
        });

        currentStream = stream;

        document
        .getElementById("video")
        .srcObject = stream;

        document
        .getElementById("cameraStatus")
        .textContent =
        "✅ กล้องพร้อมใช้งาน";

    }
    catch(e){

        document
        .getElementById("cameraStatus")
        .textContent =
        "❌ " + e.message;

        alert(
            e.name +
            "\n" +
            e.message
        );

    }

}

function stopCam(){

    if(currentStream){

        currentStream
        .getTracks()
        .forEach(track =>
            track.stop()
        );

        currentStream = null;

    }

    document
    .getElementById("video")
    .srcObject = null;

    document
    .getElementById("cameraStatus")
    .textContent =
    "⏹️ ปิดกล้องแล้ว";

}

</script>

</body>
</html>
