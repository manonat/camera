<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Stream</title>
    <style>
        #video {
            width: 100%;
            max-width: 500px;
            background-color: #ccc; /* เพิ่มพื้นหลังสีเทาระหว่างรอกล้องเปิด */
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <button onclick="startCam()">เปิดกล้อง</button>
    <br><br>
    <video id="video" autoplay playsinline></video>

<script>

async function startCam() {

    try {

        alert("Origin = " + location.origin);

        const permission =
            await navigator.permissions.query({
                name: 'camera'
            });

        alert(
            "Permission = " +
            permission.state
        );

        const devices =
            await navigator.mediaDevices.enumerateDevices();

        alert(
            devices.map(d =>
                d.kind + " : " + d.label
            ).join("\n")
        );

        const stream =
            await navigator.mediaDevices.getUserMedia({
                video:true
            });

        document
            .getElementById("video")
            .srcObject = stream;

        alert("CAMERA OK");

    }
    catch(e){

        alert(
            e.name +
            "\n" +
            e.message
        );

    }

}

</script>

</body>
</html>
